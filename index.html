<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASK - Notes</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; color: #1e293b; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); width: 100%; max-width: 650px; }
        textarea { width: 100%; height: 250px; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 1rem; resize: vertical; box-sizing: border-box; }
        .controls { display: grid; gap: 10px; margin-top: 20px; }
        .input-group { position: relative; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; }
        .toggle-pass { cursor: pointer; position: absolute; right: 10px; top: 10px; font-size: 0.8rem; color: var(--primary); font-weight: bold; }
        button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        #link-output { margin-top: 20px; padding: 15px; background: #eff6ff; border-radius: 8px; word-break: break-all; font-family: monospace; font-size: 0.85rem; border: 1px dashed #bfdbfe; }
        .badge { font-size: 0.7rem; padding: 2px 6px; background: #dcfce7; color: #166534; border-radius: 4px; margin-bottom: 5px; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔐 ASK - Notes</h2>
    <p style="font-size: 0.9rem; color: #64748b;">Zero-knowledge: Data lives only in your URL.</p>

    <textarea id="note" placeholder="Write your secret message..."></textarea>

    <div class="controls">
        <!-- Main Password -->
        <div class="input-group">
            <input type="password" id="pass1" placeholder="Main Password (Required)">
            <span class="toggle-pass" onclick="toggleView('pass1')">VIEW</span>
        </div>

        <!-- Secondary Lock -->
        <div class="input-group">
            <input type="password" id="pass2" placeholder="Secondary PIN (Optional Extra Lock)">
            <span class="toggle-pass" onclick="toggleView('pass2')">VIEW</span>
        </div>

        <button onclick="generateLink()">Generate Secure URL</button>
        <button id="changeBtn" style="display:none; background: #64748b;" onclick="enableChange()">Change Password / Update Note</button>
    </div>

    <div id="link-output" style="display:none;"></div>
</div>

<script>
    const enc = new TextEncoder();
    const dec = new TextDecoder();

    // Toggle Password Visibility
    function toggleView(id) {
        const el = document.getElementById(id);
        el.type = el.type === "password" ? "text" : "password";
    }

    // Helper: Derive Key
    async function deriveKey(password, salt) {
        const baseKey = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
        return crypto.subtle.deriveKey({ name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" }, baseKey, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]);
    }

    // Helper: Encrypt logic
    async function encrypt(text, password) {
        const salt = crypto.getRandomValues(new Uint8Array(16));
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const key = await deriveKey(password, salt);
        const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, enc.encode(text));
        return { salt, iv, encrypted: new Uint8Array(encrypted) };
    }

    async function generateLink() {
        let text = document.getElementById('note').value;
        const p1 = document.getElementById('pass1').value;
        const p2 = document.getElementById('pass2').value;

        if (!text || !p1) return alert("Note and Main Password are required!");

        // If secondary lock exists, encrypt the text twice
        if (p2) {
            const step1 = await encrypt(text, p2);
            text = JSON.stringify({
                s: btoa(String.fromCharCode(...step1.salt)),
                i: btoa(String.fromCharCode(...step1.iv)),
                d: btoa(String.fromCharCode(...step1.encrypted))
            });
        }

        const final = await encrypt(text, p1);
        const package = new Uint8Array(final.salt.length + final.iv.length + final.encrypted.length);
        package.set(final.salt);
        package.set(final.iv, 16);
        package.set(final.encrypted, 16 + 12);

        const base64 = btoa(String.fromCharCode(...package)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
        const url = window.location.origin + window.location.pathname + "#" + base64;
        
        const out = document.getElementById('link-output');
        out.style.display = "block";
        out.innerHTML = `<strong>Share this link:</strong><br><a href="${url}">${url}</a>`;
    }

    window.onload = async () => {
        const hash = window.location.hash.substring(1);
        if (!hash) return;

        const p1 = prompt("Enter Main Password:");
        if (!p1) return;

        try {
            const raw = atob(hash.replace(/-/g, '+').replace(/_/g, '/'));
            const data = Uint8Array.from(raw, c => c.charCodeAt(0));
            const salt = data.slice(0, 16);
            const iv = data.slice(16, 28);
            const encrypted = data.slice(28);

            const key = await deriveKey(p1, salt);
            const decryptedRaw = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, encrypted);
            let result = dec.decode(decryptedRaw);

            // Check for secondary lock
            try {
                const secondLayer = JSON.parse(result);
                if (secondLayer.d) {
                    const p2 = prompt("Secondary PIN required:");
                    const s2 = Uint8Array.from(atob(secondLayer.s), c => c.charCodeAt(0));
                    const i2 = Uint8Array.from(atob(secondLayer.i), c => c.charCodeAt(0));
                    const d2 = Uint8Array.from(atob(secondLayer.d), c => c.charCodeAt(0));
                    
                    const k2 = await deriveKey(p2, s2);
                    const dec2 = await crypto.subtle.decrypt({ name: "AES-GCM", iv: i2 }, k2, d2);
                    result = dec.decode(dec2);
                }
            } catch (e) { /* Not a secondary lock, just plain text */ }

            document.getElementById('note').value = result;
            document.getElementById('changeBtn').style.display = "block";
        } catch (e) {
            alert("Decryption failed. Wrong password.");
        }
    };

    function enableChange() {
        alert("The note is now editable. Change the text or passwords and click 'Generate Secure URL' to create a NEW link.");
        window.location.hash = ""; // Clear hash to reset
    }
</script>

</body>
</html>
